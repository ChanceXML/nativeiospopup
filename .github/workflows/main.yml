name: iOS Build Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Haxe
        run: brew install haxe

      - name: Install Dependencies
        run: |
          mkdir -p $HOME/haxelib
          echo $HOME/haxelib | haxelib setup
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install openfl-samples --quiet
          yes | haxelib run lime setup
          haxelib dev nativeiospopup .

      - name: Create Test Project
        run: |
          mkdir test-project
          cd test-project
          
          cat <<EOF > Project.xml
          <?xml version="1.0" encoding="utf-8"?>
          <project>
              <meta title="TestProject" package="com.test.app" version="1.0.0" />
              <app main="Main" file="TestProject" path="export" />
              <source path="Source" />
              <haxelib name="lime" />
              <haxelib name="openfl" />
              <haxelib name="nativeiospopup" />
          </project>
          EOF

          mkdir Source
          cat <<EOF > Source/Main.hx
          package;
          import openfl.display.Sprite;
          import nativeiospopup.NativePopup;

          class Main extends Sprite {
              public function new() {
                  super();
                  trace("Attempting to show popup...");
                  NativePopup.show("CI Test", "This is a test from GitHub Actions");
              }
          }
          EOF
          
      - name: Build for iOS
        run: |
          cd test-project
          haxelib run lime build ios -iphonesim -nosign
