name: iOS Build Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Haxe
        run: brew install haxe

      - name: Install Dependencies
        run: |
          mkdir -p $HOME/haxelib
          echo $HOME/haxelib | haxelib setup
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install openfl-samples --quiet
          yes | haxelib run lime setup
          haxelib dev nativeiospopup .

      - name: Create Test Project
        run: |
          mkdir test-project
          cd test-project
          haxelib run lime create openfl --null
          
          sed -i '' '/<haxelib name="openfl" \/>/a \
          <haxelib name="nativeiospopup" />' Project.xml
          
          sed -i '' '/super();/a \
          nativeiospopup.NativePopup.show("Test", "CI Test Message");' Source/Main.hx

      - name: Build for iOS
        run: |
          cd test-project
          haxelib run lime build ios -iphonesim -nosign
